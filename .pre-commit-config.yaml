default_stages: [pre-commit]

repos:
  - repo: local
    hooks:
      - id: deptry
        name: deptry
        entry: python3 -m deptry src tests
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: cubic-review
        name: cubic review
        entry: scripts/cubic_review.sh origin/main
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: codex-pr-review-toolkit
        name: codex pr review toolkit
        entry: scripts/codex_pr_review_toolkit.sh origin/main
        language: system
        pass_filenames: false
        stages: [pre-push]
