provenance: hand_labeled
source_spec: docs/regime_engine_v2_spec.md#9.4
provenance_note: >-
  V2 registration set from spec section 9.4. Expected V2 behavior is encoded
  as asserted evidence fields, not copied from RegimeEngine output.
  Two corrections vs the literal §9.4 table: (1) the table lists 2020-08-15 as
  the post-COVID-narrowing date, but that is a Saturday (non-NYSE session the
  engine rejects), so this fixture uses the nearest prior trading session
  2020-08-14; (2) the §9.4 reason for that event is stock_picker_dispersion,
  which is a network_fragility label (spec §3.4/§3.6), so it is asserted under
  the network_fragility field, not breadth_state.
