name: Release

on:
  push:
    tags:
      - "v*"
  schedule:
    - cron: "0 5 * * 2,5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: pyproject.toml
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,audit]"
      - name: Validate before release
        run: |
          python -m black --check src tests scripts
          python -m ruff check .
          python -m pyright
          python -m pytest -q -m "" --cov=src --cov-report=term-missing --cov-fail-under=80
      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('snapshot-{0}', github.run_number) }}
          generate_release_notes: true
          prerelease: ${{ !startsWith(github.ref, 'refs/tags/') }}
