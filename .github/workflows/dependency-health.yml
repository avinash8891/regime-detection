name: Dependency health

on:
  push:
  schedule:
    - cron: "0 5 * * 1"
  workflow_dispatch:

concurrency:
  group: dependency-health-${{ github.workflow }}-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  advisory-report:
    name: advisory report
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e . --no-deps

      - name: Pip audit
        continue-on-error: true
        run: python -m pip_audit -r requirements.txt -r requirements-dev.txt --progress-spinner off

      - name: Outdated packages
        continue-on-error: true
        run: python -m pip list --outdated

      - name: Vulture dead-code candidates
        continue-on-error: true
        run: python -m vulture src scripts --min-confidence 80

      - name: Ruff security candidates
        continue-on-error: true
        run: python -m ruff check . --select S
