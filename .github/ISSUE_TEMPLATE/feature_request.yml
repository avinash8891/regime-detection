name: Feature request
description: Propose a new capability or workflow improvement
title: "[feature] "
labels:
  - feature
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: What user or operator problem are we solving?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the desired behavior and any affected components
    validations:
      required: true
  - type: textarea
    id: constraints
    attributes:
      label: Constraints
      description: Required guardrails, spec references, or rollout constraints
  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - P1
        - P2
        - P3
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - engine
        - data-fetch
        - configs
        - tests
        - ci
        - observability
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation plan
      description: How should we prove the change works?
    validations:
      required: true
