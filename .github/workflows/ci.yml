name: CI

on:
  push:
    branches: [main, v1-of-regime-detection]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Git whitespace check
        shell: bash
        run: |
          set -euo pipefail
          run_diff_check() {
            # Enforce whitespace errors in the patch, but ignore Git's "new blank line at EOF"
            # message to avoid CI failures for an otherwise harmless trailing blank line.
            local range="$1"
            local out
            out="$(git diff --check "$range" || true)"
            out="$(printf '%s\n' "$out" | sed '/new blank line at EOF\.$/d')"
            if [[ -n "$out" ]]; then
              printf '%s\n' "$out"
              return 2
            fi
            return 0
          }
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Ensure the base ref exists locally for the diff.
            git fetch -q origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}"
            run_diff_check "origin/${{ github.base_ref }}...HEAD"
          else
            # For push events, compare against the previous SHA (more reliable than origin/main).
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              run_diff_check "$before...${{ github.sha }}"
            else
              # Fallback: first commit on branch, or unknown before-sha.
              # Compare against the empty tree so we still check the pushed content.
              empty_tree="$(git hash-object -t tree /dev/null)"
              run_diff_check "$empty_tree...${{ github.sha }}"
            fi
          fi

      - name: Shell syntax checks
        run: |
          bash -n scripts/cubic_review.sh
          bash -n scripts/codex_pr_review_toolkit.sh

      - name: Python test discovery
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          python -m ruff check .
          python -m pyright \
            src/regime_detection/config.py \
            src/regime_detection/transition_risk.py \
            src/regime_detection/feature_store.py \
            tests/test_feature_store_refactors.py \
            scripts/fetch_regime_engine_v1_data.py
          if [ -d tests ]; then
            pytest -q --cov=src --cov-report=term-missing --cov-fail-under=80
          else
            echo "No tests directory yet; skipping pytest until V1 implementation begins."
          fi

  slow-v2-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Detect gate-relevant paths
        id: gate_paths
        shell: bash
        run: |
          set -euo pipefail

          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git fetch -q origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}"
            range="origin/${{ github.base_ref }}...HEAD"
            changed="$(git diff --name-only "$range")"
          else
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              changed="$(git diff --name-only "$before...${{ github.sha }}")"
            else
              changed="$(git ls-files)"
            fi
          fi

          printf '%s\n' "$changed"
          gate_pattern='^(src/regime_detection/|src/regime_data_fetch/|scripts/|configs/|docs/regime_engine_v2_spec\.md|tests/test_v2_gate_scripts\.py|tests/fixtures/raw/v2/)'
          if printf '%s\n' "$changed" | grep -Eq "$gate_pattern"; then
            echo "run_gate=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_gate=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        if: steps.gate_paths.outputs.run_gate == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run slow and v2 gate tests
        if: steps.gate_paths.outputs.run_gate == 'true'
        run: |
          python -m pytest -q -o addopts="" -m "slow or v2_gate"

      - name: Skip slow and v2 gate tests
        if: steps.gate_paths.outputs.run_gate != 'true'
        run: echo "No engine/data/V2 config/script paths changed; slow/v2 gate suite skipped."
