provenance: hand_labeled
provenance_note: |-
  Single unified golden-date registry for the regime engine. There is ONE
  golden set, not separate "V1" and "V2" sets. Every row is hand-labeled:
  expected values are independently derived from market history and rule
  predicates, NOT copied from RegimeEngine output. Regenerating this file must
  NOT bless current engine output.

  A row carries one of two expectation blocks depending on which axes its
  available data supports, and is routed to the matching classification harness:
    * `expected` — core axes (trend_direction, trend_character, volatility_state,
      breadth_state, transition_risk). Classified through classified_golden_outputs
      (frozen V1 config before 2020-01-01, V2 pipeline after) and value-asserted by
      the per-axis tests.
    * `expected_v2_fields` — multi-source V2-only axes (network_fragility,
      credit_funding, volume_liquidity, transition evidence) from spec §9.4.
      Classified through v2_classify_kwargs_for_asof. Several of these dates
      predate the V1 SPY/RSP/VIXY fixture (which starts 2016-01-04), so they can
      only run through the V2 pipeline.

  Two §9.4 transcription corrections: 2020-08-15 is a Saturday (non-NYSE) so
  post_covid_narrowing uses the prior session 2020-08-14; stock_picker_dispersion
  is a network_fragility label (§3.4/§3.6), asserted there rather than as breadth.

  VALUE-ASSERT STATUS (test_v2_golden_dates_classify_expected_fields, slow lane).
  The expected_v2_fields rows are VALUE-compared to the engine's emitted labels under
  the PRODUCTION config — not presence-only. Outcomes, no silent relaxation: GREEN
  where the engine matches §9.4; UNSUPPORTED for the four pre-2019 dates
  (2010/2011/2015/2018), which raise on missing deep-history model-evidence
  (HMM=1260 / clustering=1260 / change-point=2705-session windows) the fixture cannot
  supply — the multi-asset instruments did not exist far enough back, and real ICE-OAS
  credit is license-blocked; and a self-policing DISPUTED set for the residual
  §9.4-vs-engine disagreements.

  A 2026-06 measurement pass settled the original six disputes by reproducing the
  engine's own rule features to full precision from the raw fixture (a blind recompute
  + a second independent §3.4/§3.5 ladder derivation): NONE was an engine bug. Two
  §9.4 expectations were therefore corrected to their independently-derived rule labels
  and now pass GREEN — 2020-08-14 stock_picker_dispersion -> diversified_normal
  (a narrowing tape is concentration, not low-correlation dispersion; corr_pct 0.66)
  and 2024-08-05 funding_squeeze -> credit_stress (no USD funding spike: z=-0.017).
  The four remaining disputed entries are NON-engine-bug: boundary near-miss
  (2021-01-27 corr_pct 0.317 vs <0.30; 2022-09-26 vol_pctile 0.698 vs >0.75, also
  §2C data-gated), spec gap (2024-08-05 correlation_to_one — 504d percentile cannot
  represent a 1-day shock, ADR 0022), and data-blocked (2023-03-13 credit_stress —
  real ICE-OAS absent pre-2023-05-15, proxy reads 0.61). The test breaks if any
  documented gap silently appears or resolves.
