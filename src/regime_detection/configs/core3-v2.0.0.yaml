config_version: core3-v2.0.0
market: US
trading_calendar: NYSE
breadth_mode: etf_proxy
etf_proxy:
  cap_weight_index: SPY
  equal_weight_proxy: RSP
event_calendar:
  market: US
expiry_rules:
  monthly_options:
    rule: third_friday_of_month
    window_trading_days: [-2, 0]
    label: expiry_week
earnings_seasons:
  - quarter: Q1
    start_rule: second_monday_of_january
    end_offset_days: 35
  - quarter: Q2
    start_rule: second_monday_of_april
    end_offset_days: 35
  - quarter: Q3
    start_rule: second_monday_of_july
    end_offset_days: 35
  - quarter: Q4
    start_rule: second_monday_of_october
    end_offset_days: 35
data_quality:
  max_freshness_days: 3
  min_completeness: 0.90
hysteresis:
  trend_direction_deescalation_days: 3
  trend_character_deescalation_days: 3
  volatility_deescalation_days: 2
  breadth_deescalation_days: 2
  composite_deescalation_days: 3
  event_calendar_days: 1

# ---------------------------------------------------------------------------
# V2 sub-configs (per docs/regime_engine_v2_spec.md).
#
# Slices not yet implemented (inflation_growth, credit_funding,
# event_calendar_v2, strategy_cohort, strategy_family_constraints) are
# intentionally omitted so they remain None on load.
# ---------------------------------------------------------------------------

network_fragility:
  # v2 spec §3.1 — 22 assets: 11 sector ETFs + SPY (broad-market index) +
  # 10 cross-asset proxies. SPY's close flows through MarketContext.spy_ohlcv
  # on the V1 path; the engine still treats it as part of the universe when
  # building the correlation matrix. KRE is v2 §2C credit/funding territory,
  # not §3.1 — moved out of this universe.
  universe:
    - XLB
    - XLC
    - XLE
    - XLF
    - XLI
    - XLK
    - XLP
    - XLRE
    - XLU
    - XLV
    - XLY
    - SPY
    - QQQ
    - IWM
    - EFA
    - EEM
    - TLT
    - GLD
    - HYG
    - LQD
    - USO
    - UUP
  correlation_lookback_days: 63                   # v2 §3.2 line 554-558 ("63d corr")
  percentile_lookback_days: 504                   # v2 §3.2 line 563-566 (504d percentile)
  realized_vol_lookback_days: 21                  # v2 §3.2 line 588-593 (21d realised vol)
  dispersion_percentile_lookback_days: 252        # v2 §3.2 dispersion percentile lookback (~1y)
  min_universe_size: 20                           # implementation default — calibration target (v2 §9.1)
  min_window_completeness: 0.90                   # implementation default — calibration target (v2 §9.1)
  deescalation_days_by_label:
    rising_fragility: 3
    correlation_concentration: 3
    correlation_to_one: 5
    systemic_stress: 5
    # v2 Implementation Ambiguity Log entry #8 (slice-1 cleanup): an `unknown`
    # raw label has risk_rank=2, lower than correlation_to_one (3). Without an
    # explicit hold, a single-day flicker through `unknown` (e.g. a quality
    # gap on day N) would fast-track de-escalation through the lower-risk
    # band. Treat `unknown` as a high-risk hold equal to `correlation_to_one`
    # (5d) so flicker doesn't silently relax the axis.
    unknown: 5
  # v2 §3.7 default for labels NOT listed above (diversified_normal,
  # stock_picker_dispersion). 0 = immediate de-escalation; calibration §9.1
  # may retune. See Implementation Ambiguity Log entry #6.
  default_deescalation_days: 0
  # v2 §3.4–§3.5 rule-engine thresholds (Slice 1.3). Every value cites its
  # spec line in docs/regime_engine_v2_spec.md.
  rules:
    diversified_normal_percentile_lo: 0.25            # §3.5 line 619
    diversified_normal_percentile_hi: 0.75            # §3.5 line 619
    effective_rank_stability_threshold: 0.05          # §3.5 line 620 ("21d std < 5% of mean")
    stock_picker_percentile_max: 0.30                 # §3.5 line 625
    stock_picker_dispersion_percentile_min: 0.70      # §3.5 line 626
    concentration_corr_percentile_min: 0.75           # §3.5 line 639
    concentration_largest_eig_percentile_min: 0.75    # §3.5 line 640
    concentration_effective_rank_percentile_max: 0.25 # §3.5 line 641
    corr_to_one_corr_percentile_min: 0.90             # §3.5 line 646
    corr_to_one_realized_vol_percentile_min: 0.80     # §3.5 line 647
    corr_to_one_drawdown_max: 0.0                     # §3.5 line 648 ("drawdown_21d < 0")
    systemic_stress_vix_percentile_min: 0.80          # §3.5 line 655

transition_score:
  weights_with_hmm:
    volatility_acceleration: 0.20
    breadth_deterioration: 0.20
    correlation_concentration: 0.20
    trend_break: 0.20
    macro_event: 0.10
    hmm_probability_shift: 0.10
  weights_without_hmm:
    volatility_acceleration: 0.225
    breadth_deterioration: 0.225
    correlation_concentration: 0.225
    trend_break: 0.225
    macro_event: 0.10
  bands:
    stable: [0.00, 0.35]
    weakening: [0.35, 0.55]
    transition_warning: [0.55, 0.75]
    high: [0.75, 1.00]

monetary_pressure_v2:
  series_ids:
    2y_yield: DGS2
    10y_yield: DGS10
    broad_usd_index: DTWEXBGS
  yield_change_lookback_days: 63
  tightening_threshold_bps: 50
  easing_threshold_bps: -50
  dxy_threshold_pct: 0.05

vol_crush:
  event_window_trading_days: 3
  implied_vol_5d_change_threshold: -0.20
  realized_vol_ratio_threshold: 0.75

hmm:
  n_states: 4
  training_window_days: 504
  retrain_cadence_days: 21

no_flip_flop:
  window_trading_days: 5
