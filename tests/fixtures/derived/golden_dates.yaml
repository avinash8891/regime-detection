# dates predate the V1 SPY/RSP/VIXY fixture (starts 2016-01-04). Presence-checked
# today — value-assert hardening deferred (see provenance_note).
- intent_id: flash_crash_2010
  as_of_date: '2010-05-06'
  expected_v2_fields:
    network_fragility: systemic_stress
    transition_evidence: correlation_to_one
- intent_id: us_downgrade_2011
  as_of_date: '2011-08-08'
  expected_v2_fields:
    credit_funding: credit_stress
    transition_evidence: funding_squeeze
- intent_id: china_devaluation_2015
  as_of_date: '2015-08-24'
  expected_v2_fields:
    network_fragility: rising_fragility
    transition_evidence: correlation_to_one
- intent_id: q4_2018_breadth_stress
  as_of_date: '2018-10-10'
  expected_v2_fields:
    sequence: bull_to_narrowing_breadth_to_bear_stress
- intent_id: post_covid_narrowing_2020
  as_of_date: '2020-08-14'
  # §9.4 named this date for stock_picker_dispersion, but that label requires LOW
  # aggregate correlation (avg_pairwise_corr_percentile_504d < 0.30). A post-COVID
  # mega-cap NARROWING tape is a concentration phenomenon, the opposite of a broad
  # stock-picker market. Corrected to the independently-derived §3.4/§3.5 label
  # (recomputed from the raw 24-ETF universe + spec ladder, NOT copied from engine
  # output, and cross-checked by a second blind implementation): at corr_pct=0.6627
  # the precedence walk lands on diversified_normal — concentration absorption_top3
  # 0.767<0.90, rising_fragility fails on a negative avg-corr 21d slope, rotation_watch
  # fails as effective_rank_stability 0.019<0.05. See docs/decisions/0022.
  expected_v2_fields:
    network_fragility: diversified_normal
- intent_id: gamestop_2021
  as_of_date: '2021-01-27'
  expected_v2_fields:
    network_fragility: stock_picker_dispersion
    volume_liquidity_state: panic_volume
- intent_id: uk_gilt_crisis_2022
  as_of_date: '2022-09-26'
  expected_v2_fields:
    transition_evidence: deleveraging
- intent_id: svb_2023
  as_of_date: '2023-03-13'
  expected_v2_fields:
    transition_risk_minimum: watch
    credit_funding: credit_stress
- intent_id: yen_carry_unwind_2024
  as_of_date: '2024-08-05'
  # funding_squeeze corrected to credit_stress. funding_squeeze requires a USD
  # FUNDING spike (broad_usd_index_zscore_21d > +1.5); the yen-carry unwind was a
  # USD-flat/risk-off event (independently measured z = -0.017). The independently
  # derived §2C label is credit_stress (proxy hy_tr_differential_percentile_504d
  # 0.994 > 0.80 AND spy_21d_return -0.067 < -0.05; deleveraging and funding_squeeze
  # both fail their own gates). correlation_to_one is RETAINED as a documented spec
  # gap (docs/decisions/0022): §3.5's 504d-percentile predicate cannot fire on a
  # single-day correlation shock (corr_pct 0.349), so it stays in the self-policing
  # disputed set rather than being asserted GREEN.
  expected_v2_fields:
    transition_evidence:
    - correlation_to_one
    - credit_stress
