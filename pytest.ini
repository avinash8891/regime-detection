[pytest]
# Default: skip `slow`-marked confidence tests so the local suite stays under
# ~3 minutes on an 8-core machine. To run the full slow-confidence suite:
#     python3.14 -m pytest -m slow   # only slow-marked tests
#     python3.14 -m pytest -m ""     # full suite (slow + default)
# CI and pre-merge gates must run the full suite.
addopts = -q -m "not slow" -n auto
pythonpath =
    src
markers =
    unit: pure unit tests, no I/O or fixtures beyond pandas DataFrames.
    integration: tests that exercise multiple modules end-to-end.
    slow: expensive confidence tests excluded from the default local suite; run with `-m slow` or override `-m`.
    v2_slice: tests gated to a specific v2 slice (per v2 spec §8 ordering).
    v2_gate: v2 §9.1 performance-gate tests; required pre-merge for v2 slice PRs.
    v2_shadow: v2 §9.3 60-day A/B shadow tests; long-running, off by default.
