config_version: core3-v1.0.0
market: US
trading_calendar: NYSE
breadth_mode: etf_proxy
etf_proxy:
  cap_weight_index: SPY
  equal_weight_proxy: RSP
event_calendar:
  market: US
expiry_rules:
  monthly_options:
    rule: third_friday_of_month
    window_trading_days: [-2, 0]
    label: expiry_week
earnings_seasons:
  - quarter: Q1
    start_rule: second_monday_of_january
    end_offset_days: 35
  - quarter: Q2
    start_rule: second_monday_of_april
    end_offset_days: 35
  - quarter: Q3
    start_rule: second_monday_of_july
    end_offset_days: 35
  - quarter: Q4
    start_rule: second_monday_of_october
    end_offset_days: 35
data_quality:
  max_freshness_days: 3
  min_completeness: 0.90
trend_direction:
  deescalation_days_by_label:
    bear: 3
    transition: 3
    sideways: 3
    bull: 3
    unknown: 3
  default_deescalation_days: 3
volatility_state:
  deescalation_days_by_label:
    crisis_vol: 2
    high_vol: 2
    rising_vol: 2
    low_vol: 2
    normal_vol: 2
    vol_crush: 2
    unknown: 2
  default_deescalation_days: 2
breadth_state:
  deescalation_days_by_label:
    weak_breadth: 2
    healthy_breadth: 2
    unknown: 2
  default_deescalation_days: 2
trend_character:
  deescalation_days_by_label:
    breakout_expansion: 3
    recovery_attempt: 3
    trending: 3
    mild_trend: 3
    range_bound: 3
    chop: 3
    volatile_chop: 3
    transition: 3
    unknown: 3
  default_deescalation_days: 3
trend_direction_v2:
  efficiency_ratio_lookback_days: 20
  hurst_lookback_days: 250
  slope_lookback_days: 20
  sma_short_period: 50
  sma_long_period: 200
  return_short_period: 63
  return_long_period: 126
  drawdown_lookback_days: 252

volatility_state_v2:
  atr_short_period: 14
  atr_long_period: 50
  gap_frequency_lookback_days: 20
  gap_threshold_pct: 0.005
  intraday_range_lookback_days: 252

breadth_state_v2:
  sector_breadth_lookback_days: 21

trend_character_v2: {}
