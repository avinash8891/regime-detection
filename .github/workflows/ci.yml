name: CI

on:
  push:
    branches: [main, v1-of-regime-detection]
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Git whitespace check
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            git diff --check "origin/${{ github.base_ref }}...HEAD"
          else
            # For push events, compare against the previous SHA (more reliable than origin/main).
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              git diff --check "$before...${{ github.sha }}"
            else
              # Fallback: first commit on branch, or unknown before-sha.
              git diff --check
            fi
          fi

      - name: Shell syntax checks
        run: |
          bash -n scripts/cubic_review.sh
          bash -n scripts/codex_code_simplifier.sh
          bash -n scripts/codex_pr_review_toolkit.sh

      - name: Python test discovery
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          if [ -d tests ]; then
            pytest -q
          else
            echo "No tests directory yet; skipping pytest until V1 implementation begins."
          fi
