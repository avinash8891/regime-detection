name: CI

on:
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref_name }}
  cancel-in-progress: true

jobs:
  checks:
    name: checks (${{ github.event_name }})
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: requirements-dev.txt

      - name: Capture CI start time
        run: echo "CI_START=$(date +%s)" >> "$GITHUB_ENV"

      - name: Git whitespace check
        shell: bash
        run: |
          set -euo pipefail
          run_diff_check() {
            # Enforce whitespace errors in the patch, but ignore Git's "new blank line at EOF"
            # message to avoid CI failures for an otherwise harmless trailing blank line.
            local range="$1"
            local out
            out="$(git diff --check "$range" || true)"
            out="$(printf '%s\n' "$out" | sed '/new blank line at EOF\.$/d')"
            if [[ -n "$out" ]]; then
              printf '%s\n' "$out"
              return 2
            fi
            return 0
          }
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            # Ensure the base ref exists locally for the diff.
            git fetch -q origin "${{ github.base_ref }}":"refs/remotes/origin/${{ github.base_ref }}"
            run_diff_check "origin/${{ github.base_ref }}...HEAD"
          else
            # For push events, compare against the previous SHA (more reliable than origin/main).
            before="${{ github.event.before }}"
            if [[ -n "$before" && "$before" != "0000000000000000000000000000000000000000" ]]; then
              run_diff_check "$before...${{ github.sha }}"
            else
              # Fallback: first commit on branch, or unknown before-sha.
              # Compare against the empty tree so we still check the pushed content.
              empty_tree="$(git hash-object -t tree /dev/null)"
              run_diff_check "$empty_tree...${{ github.sha }}"
            fi
          fi

      - name: Shell syntax checks
        run: |
          bash -n scripts/cubic_review.sh
          bash -n scripts/codex_pr_review_toolkit.sh

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e . --no-deps

      - name: Ruff
        run: python -m ruff check .

      - name: Black
        run: python -m black --check src tests scripts

      - name: Validate AGENTS.md automation
        run: python scripts/validate_agents_md.py

      - name: Radon
        run: python -m radon cc src/regime_detection/observability.py -s -n B

      - name: jscpd
        run: npx jscpd --config .jscpd.json

      - name: Deptry
        run: python -m deptry . --ignore DEP003

      - name: Pyright
        run: python -m pyright

      - name: Pytest full suite
        run: |
          if [ -d tests ]; then
            python -m pytest --cov=src --cov-report=term-missing --cov-fail-under=80
          else
            echo "No tests directory yet; skipping pytest until V1 implementation begins."
          fi

      - name: Report CI duration
        if: always()
        run: |
          end_ts="$(date +%s)"
          elapsed="$((end_ts - CI_START))"
          {
            echo "## CI duration"
            echo
            echo "- Total seconds: ${elapsed}"
            echo "- Pip cache: enabled via actions/setup-python"
          } >> "$GITHUB_STEP_SUMMARY"
