config_version: core3-v2.0.0
market: US
trading_calendar: NYSE
breadth_mode: etf_proxy
etf_proxy:
  cap_weight_index: SPY
  equal_weight_proxy: RSP
event_calendar:
  market: US
expiry_rules:
  monthly_options:
    rule: third_friday_of_month
    window_trading_days: [-2, 0]
    label: expiry_week
earnings_seasons:
  - quarter: Q1
    start_rule: second_monday_of_january
    end_offset_days: 35
  - quarter: Q2
    start_rule: second_monday_of_april
    end_offset_days: 35
  - quarter: Q3
    start_rule: second_monday_of_july
    end_offset_days: 35
  - quarter: Q4
    start_rule: second_monday_of_october
    end_offset_days: 35
data_quality:
  max_freshness_days: 3
  min_completeness: 0.90
# Axis-level hysteresis used by the profile/timeline path regardless of
# whether raw labels came from V1 rules or V2 feature overrides.
trend_direction:
  deescalation_days_by_label:
    bear: 5
    transition: 3
    recovery: 3
    sideways: 2
    bull: 0
    euphoria: 3
    unknown: 0
  default_deescalation_days: 3
  max_unknown_freeze_days: 2
trend_character:
  deescalation_days_by_label:
    breakout_expansion: 3
    recovery_attempt: 3
    trending: 0
    mild_trend: 0
    range_bound: 3
    chop: 0
    volatile_chop: 0
    transition: 2
    unknown: 0
  default_deescalation_days: 0
  max_unknown_freeze_days: 2
volatility_state:
  deescalation_days_by_label:
    crisis_vol: 5
    vol_crush: 3
    high_vol: 3
    rising_vol: 2
    low_vol: 0
    normal_vol: 0
    unknown: 0
  default_deescalation_days: 2
  max_unknown_freeze_days: 2
breadth_state:
  deescalation_days_by_label:
    divergent_fragile: 5
    weak_breadth: 3
    narrowing_breadth: 3
    broadening_breadth: 0
    healthy_breadth: 0
    unknown: 0
  default_deescalation_days: 2
  max_unknown_freeze_days: 2
# ---------------------------------------------------------------------------
# V2 sub-configs (per docs/regime_engine_v2_spec.md).
#
# §2D event calendar is fully implemented via _V2_TYPE_TO_LABEL and _WINDOWS.
# ---------------------------------------------------------------------------

# V2 feature/rule config only. Hysteresis lives in the neutral top-level
# `trend_character` axis section.
trend_character_v2: {}

network_fragility:
  # v2 spec §3.1 — 24 assets: 11 sector ETFs + SPY (broad-market index) +
  # 12 cross-asset proxies. SPY's close flows through MarketContext.spy_ohlcv
  # on the V1 path; the engine still treats it as part of the universe when
  # building the correlation matrix. DBC/IEF were added together after A/B
  # testing; KRE remains v2 §2C credit/funding territory, not §3.1.
  universe:
    - XLB
    - XLC
    - XLE
    - XLF
    - XLI
    - XLK
    - XLP
    - XLRE
    - XLU
    - XLV
    - XLY
    - SPY
    - QQQ
    - IWM
    - EFA
    - EEM
    - TLT
    - IEF
    - GLD
    - HYG
    - LQD
    - USO
    - DBC
    - UUP
  correlation_lookback_days: 63                   # v2 §3.2 line 554-558 ("63d corr")
  percentile_lookback_days: 504                   # v2 §3.2 line 563-566 (504d percentile)
  realized_vol_lookback_days: 21                  # v2 §3.2 line 588-593 (21d realised vol)
  dispersion_percentile_lookback_days: 252        # v2 §3.2 dispersion percentile lookback (~1y)
  min_universe_size: 20                           # implementation default — calibration target (v2 §9.1)
  min_window_completeness: 0.90                   # implementation default — calibration target (v2 §9.1)
  deescalation_days_by_label:
    rising_fragility: 3
    correlation_concentration: 3
    correlation_to_one: 5
    systemic_stress_unconfirmed: 5
    systemic_stress: 5
    # `unknown` is absence of signal, not a sticky regime. Do not delay
    # recovery into a valid classified label; classified high-risk labels
    # still hold via the threshold on the stable label being left.
    unknown: 0
  # v2 §3.7 default for labels NOT listed above (diversified_normal,
  # stock_picker_dispersion). 0 = immediate de-escalation; calibration §9.1
  # may retune. See documented implementation decision.
  default_deescalation_days: 0
  max_unknown_freeze_days: 2
  # v2 §3.4–§3.5 rule-engine thresholds (implementation phase). Every value cites its
  # spec line in docs/regime_engine_v2_spec.md.
  rules:
    diversified_normal_percentile_lo: 0.0              # §3.5 line 619 (lowered from 0.25: sub-25th-pctile correlation is more diversified, not less)
    diversified_normal_percentile_hi: 0.75            # §3.5 line 619
    effective_rank_stability_threshold: 0.05          # §3.5 line 620 ("21d std < 5% of mean")
    stock_picker_percentile_max: 0.30                 # §3.5 line 625
    stock_picker_dispersion_percentile_min: 0.70      # §3.5 line 626
    concentration_corr_percentile_min: 0.75           # §3.5 line 639
    concentration_largest_eig_percentile_min: 0.75    # §3.5 line 640
    concentration_effective_rank_percentile_max: 0.25 # §3.5 line 641
    concentration_absorption_ratio_min: 0.90          # top-3 eigenvalue dominance
    corr_to_one_corr_percentile_min: 0.90             # §3.5 line 646
    corr_to_one_realized_vol_percentile_min: 0.80     # §3.5 line 647
    corr_to_one_drawdown_max: 0.0                     # §3.5 line 648 ("drawdown_21d < 0")
    cold_start_corr_to_one_enabled: true              # explicit warmup fallback; still requires severe raw corr/eigen/vol
    cold_start_corr_to_one_avg_corr_min: 0.90
    cold_start_corr_to_one_largest_eig_min: 0.75
    cold_start_corr_to_one_realized_vol_min: 0.25
    systemic_stress_vix_percentile_min: 0.80          # §3.5 line 655
    diversified_normal_relaxed_inner_band: true        # rank instability ok in mid-corr
    diversified_normal_inner_band_lo: 0.30
    diversified_normal_inner_band_hi: 0.60

# v2 §1A — Layer 1 V2 Trend Direction (implementation phase features +
# `recovery` and `euphoria` labels). `recovery` is live; `euphoria` is
# predicate-complete but falsifies when AAII sentiment_score is absent
# (V2 §10 no-proxy rule). `breakout_expansion` and `range_bound` are
# implemented in trend_character (§1B), not §1A.
trend_direction_v2:
  efficiency_ratio_lookback_days: 20    # v2 §1A line 66
  hurst_lookback_days: 250              # v2 §1A line 79
  slope_lookback_days: 20               # v2 §1A line 106
  sma_short_period: 50                  # v2 §1A line 107
  sma_long_period: 200                  # v2 §1A line 108
  return_short_period: 63               # v2 §1A line 117
  return_long_period: 126               # v2 §1A line 124
  drawdown_lookback_days: 252           # v2 §1A line 116
  rules:
    recovery_drawdown_threshold: -0.15  # v2 §1A line 116
    recovery_return_threshold: 0.10     # v2 §1A line 117

# v2 §1C — Layer 1 V2 Volatility features (implementation phase + 2.6 + ADR 0005).
# atr_ratio / gap_frequency_20d / intraday_range_percentile_252d from OHLC;
# the `vol_crush` IV features (implied_vol_30d, implied_vol_5d_change,
# iv_rv_spread) light up when MarketContext.implied_vol_30d (FRED VIXCLS/100)
# is supplied — free feed, no paid options data (documented implementation decision).
volatility_state_v2:
  atr_short_period: 14                  # v2 §1C line 142 (ATR_14, Wilder)
  atr_long_period: 50                   # v2 §1C line 142 (ATR_50, Wilder)
  gap_frequency_lookback_days: 20       # v2 §1C line 179
  gap_threshold_pct: 0.005              # v2 §1C line 181, US default
  intraday_range_lookback_days: 252     # v2 §1C line 186
  # v2 §1C `rising_vol` rule (implementation phase) + `vol_crush` rule (ADR 0005 /
  # documented implementation decision — implied_vol_30d from FRED VIXCLS, no paid feed).
  rules:
    atr_ratio_threshold: 1.15           # v2 §1C line 147
    realized_vol_ratio_threshold: 1.25  # v2 §1C line 148
    realized_vol_short_period: 10       # v2 §1C line 148 (realized_vol_10d)
    realized_vol_long_period: 63        # v2 §1C line 148 (realized_vol_63d)
    # vol_crush rule knobs (ADR 0005):
    vol_crush_realized_vol_mid_period: 21              # spec — realized_vol_21d
    vol_crush_realized_vol_ratio_threshold: 0.75       # spec — rv_10d < rv_21d * 0.75
    vol_crush_implied_vol_change_threshold: -0.20      # ADR 0005 Q1 — relative 5d drop
    vol_crush_implied_vol_change_lookback_sessions: 5  # ADR 0005 Q1
    vol_crush_event_window_trailing_sessions: 3        # ADR 0005 Q3 — spec "3 NYSE days"

# v2 §1D — Layer 1 V2 Breadth features.
#
# Ships:
#   sector_breadth — % of 11 GICS sector ETFs with return_21d > 0.
#   PIT breadth    — pct_above_*dma, AD line, NH/NL, up/down volume, breadth
#                    thrust, and V2 breadth labels when PIT constituent inputs
#                    are supplied. The current free PIT source is bias-warning
#                    tagged and emitted under pit_constituent_biased_research
#                    mode until replaced by a true vendor PIT feed.
breadth_state_v2:
  sector_breadth_lookback_days: 21      # v2 §1D line 229
  label_rate_of_change_lookback_sessions: 5   # v2 §1D documented implementation decision
  nh_nl_ratio_narrowing_threshold: 0.4         # v2 §1D line 280

# v2 §1E — Layer 1 V2 Volume / Liquidity features (implementation phase, evidence-only).
# Ships ONLY:
#   volume_zscore_20d — (volume - rolling_mean_20) / rolling_std_20 (§1E line 256).
#
# The other two §1E features (gap_frequency_20d, intraday_range_percentile_252d)
# already live in volatility_state_v2 (implementation phase); the §1E axis classifier
# reads them from FeatureStore.volatility_state_v2 — no recompute.
volume_liquidity_v2:
  volume_zscore_lookback_days: 20       # v2 §1E line 256
  volume_zscore_ddof: 1                 # pandas/numpy default; pinned in documented implementation notes

# v2 §1E — Volume / Liquidity axis classifier (implementation phase).
# Rule layer on top of the volume_zscore_20d feature.
# Ships `panic_volume`, `liquidity_gap_behavior`, and `normal_volume` live.
# `liquidity_gap_behavior` consumes the two percentile inputs from
# volatility_state_v2 (documented implementation decision).
volume_liquidity_state:
  rules:
    # TODO(calibration): Do not retune these thresholds opportunistically.
    # Future full-axis walk-forward calibration must freeze manifest/config,
    # predeclare metrics and train/validation/test windows, evaluate all
    # configurable axes plus transition_score out-of-sample, and leave
    # spec-pinned thresholds unchanged unless results show stable improvement.
    panic_volume_zscore_threshold: 2.0                    # v2 §1E line 272
    panic_volume_return_threshold: -0.02                  # v2 §1E line 273
    liquidity_gap_frequency_percentile_threshold: 0.75    # v2 §1E line 278
    liquidity_gap_intraday_range_percentile_threshold: 0.75  # v2 §1E line 279
  # §1E is silent on hysteresis days. Pinned per documented implementation decision:
  #   panic_volume = 2 (calibrated on 2016-01-04..2026-05-15 walk-forward;
  #     preserves churn reduction while avoiding excessive panic overhang).
  #   normal_volume = 0 (immediate de-escalation; lowest risk_rank).
  #   unknown = 0 (absence-of-signal clears immediately on recovery).
  #   liquidity_gap_behavior = 2 (same rank as `unknown`).
  deescalation_days_by_label:
    panic_volume: 2
    normal_volume: 0
    unknown: 0
    liquidity_gap_behavior: 2
  default_deescalation_days: 0
  max_unknown_freeze_days: 2

transition_score:
  weights:
    trend_break: 0.18
    volatility_acceleration: 0.16
    breadth_deterioration: 0.16
    correlation_fragility: 0.14
    credit_stress: 0.12
    liquidity_stress: 0.10
    macro_event: 0.06
    model_instability: 0.08
  minimum_component_weight_coverage: 0.75
  # Score bands are base transition-pressure states. The transition-risk
  # composer combines them with named rule overrides; top-band `high` becomes
  # final state `high_transition_risk` unless a specific stress rule wins.
  bands:
    stable: [0.00, 0.35]
    weakening: [0.35, 0.55]
    transition_warning: [0.55, 0.75]
    high: [0.75, 1.00]
  cooldown_window_days: 5  # ADR 0013 R1: axis-switch watch window
  state_confirmation_days:
    stable: 1
    watch: 1
    weakening: 2
    transition_warning: 2
    high_transition_risk: 2
    fragile_bull: 2
    recovery_attempt: 2
    bear_stress: 1
    crisis: 1
    insufficient_data: 1

# v2 §2A — Layer 2A Monetary/Liquidity V2. Feature seam (implementation phase) AND
# axis classifier are both shipped. Five z-score features per §2A line 896
# and documented implementation decision (a): yield_change_zscore_{2y,10y}_63d on FRED
# DGS2/DGS10, broad_usd_index_zscore_63d on required DTWEXBGS, and the
# 21d-variant yield_change_zscore_21d_{2y,10y}. Source contract: §2A
# lines 887–889.
# The §2A label set, precedence, risk-rank, and per-label hysteresis were
# pinned by documented implementation decision (b–e) and are consumed by
# MonetaryPressureV2SeriesClassifier (axis_series.py) — entries #44/#45/#46
# are fully resolved, nothing deferred.
monetary_pressure_v2:
  yield_change_lookback_days: 63      # v2 §2A line 896
  zscore_normalizer_window_days: 1260 # v2 §2A line 896 (5y trading days)
  rate_shock_lookback_days: 21        # v2 §2A 21d-variant (documented implementation decision a)
  broad_usd_lookback_days: 63         # v2 §2A USD index 63d-change (documented implementation decision a)

# v2 §2A — Monetary Pressure axis classifier (documented implementation decision b–e).
monetary_pressure_state:
  rules:
    tightening_pressure_zscore_threshold: 1.5   # §2A line 1093
    easing_pressure_zscore_threshold: -1.5      # §2A line 1098
    rate_shock_zscore_threshold: 2.0            # §2A line 1102
  # Per documented implementation decision (e).
  deescalation_days_by_label:
    rate_shock: 5
    tightening_pressure: 3
    easing_pressure: 2
    neutral_monetary: 0
    # Unknown means source/feature quality was unavailable, not a monetary
    # regime. Once the current-session §2A features recover, do not keep a
    # stale unknown label active via hysteresis.
    unknown: 0
  default_deescalation_days: 0
  max_unknown_freeze_days: 2

# v2 §2A lines 2578-2586 — central-bank-text classifier feeding
# monetary_pressure.evidence. Source-data audit (the source-data audit
# §3.1). The spec phrasing names an "LLM classifier" but V1 §2.2 stateless
# replay forbids non-deterministic ops, so the engine uses a deterministic
# hawkish/dovish lexicon (regime_detection.central_bank_text) as the
# approved-substitute. Bias-warning row emitted with code
# `central_bank_text_deterministic_lexicon_substitute`. The score is
# EVIDENCE ONLY — never read by any §2A rule predicate per spec line 2585.
central_bank_text:
  # NYSE-session smoothing window over the per-release forward-filled
  # net_score series. Default 30 ≈ 6 weeks ≈ four FOMC-cycle releases,
  # mirrors AAII 8w-MA cadence used by §1A `sentiment_score`. v2 §9.1
  # walk-forward calibration placeholder — may retune.
  smoothing_window_sessions: 30
  # Drop releases older than this many calendar days at scoring time.
  # Default 365 keeps one full policy cycle of evidence and excludes
  # rows that pre-date the OHLCV window.
  max_release_age_days: 365
  # Audit follow-up #12 — same-date collision strategy. When FOMC
  # minutes and a Powell speech share a release date:
  #   pick_longer            — row with larger total_tokens wins (default)
  #   token_weighted_average — average net_score by token weight
  #   fomc_priority          — FOMC minutes win unconditionally
  same_date_aggregation: pick_longer

# v2 §1A SF Fed Daily News Sentiment Index — EVIDENCE-only second
# sentiment voice alongside the AAII bull-bear 8w-MA `sentiment_score`.
# The §1A `euphoria` rule predicate (spec line 164) consumes only the
# AAII series; this block does NOT modify that rule. The news sentiment
# score + the derived `sentiment_concordance` flag surface in evidence
# dicts so downstream consumers can treat divergent firings as lower-
# conviction. Source: Shapiro / Sudhof / Wilson 2020, "Measuring news
# sentiment", *Journal of Econometrics*; published daily by SF Fed.
# Bias-warning code: `news_sentiment_sf_fed_daily_news_index`.
news_sentiment:
  # Smoothing window over the daily SF Fed series. Default 21 NYSE
  # sessions ≈ 1 month — short enough to react to material narrative
  # shifts, long enough to dampen single-day noise. v2 §9.1
  # walk-forward calibration placeholder.
  smoothing_window_sessions: 21

# v2 §2C — Credit/Funding axis. Per documented implementation decision, §2C carries
# TWO parallel credit-spread metrics plus an explicit effective downstream
# resolver:
#  1. Real ICE BofA OAS — `hy_oas` = BAMLH0A0HYM2, `ig_bbb_oas` =
#     BAMLC0A4CBBB, on `MarketContext.macro_series`. FRED truncated these
#     to a trailing ~3-year window (start 2023-05-15 — documented implementation decision), so the
#     real-OAS label `credit_funding_state` is `unknown` before ~2023.
#  2. TLT-vs-HYG/LQD total-return-differential proxy — computed from the
#     HYG/LQD/TLT closes, full history, producing the parallel
#     `credit_funding_state_proxy` label via the same scale-invariant rule
#     schema, with a `credit_spread_proxy_total_return_differential`
#     bias-warning row.
#  3. `credit_funding_effective_state` preserves both labels in evidence and
#     routes cross-axis consumers through this policy: OAS when it is the only
#     classified signal, proxy when OAS is unavailable, and the higher-risk
#     label when both directional signals diverge.
# The cross-asset universe (HYG/LQD/TLT/KRE + SOFR/IORB/NFCI +
# broad_usd_index) is hard-pinned in code (spec §2C lines 2024-2030).
credit_funding:
  rules:
    # All defaults match spec verbatim (§2C lines 2064-2088). v2 §9.1
    # calibration may retune.
    hy_percentile_calm_max: 0.50              # §2C line 2066
    spread_widening_hy_only: false            # require both HY AND IG slopes per §2C
    hy_percentile_stress_min: 0.80            # §2C line 2074
    spy_drop_threshold: -0.05                 # §2C lines 2075/2083
    broad_usd_zscore_funding_threshold: 1.5   # §2C line 2078
    broad_usd_zscore_deleveraging_threshold: 0.0  # §2C line 2085
    realized_vol_percentile_threshold: 0.75   # §2C line 2086
    correlation_percentile_threshold: 0.75    # §2C line 2087
    cold_start_deleveraging_enabled: true      # explicit warmup fallback; still requires severe raw vol/correlation
    cold_start_deleveraging_realized_vol_21d_min: 0.25
    cold_start_deleveraging_avg_corr_63d_min: 0.75
    hy_percentile_504d_lookback: 504          # §2C line 2038
    slope_21d_lookback: 21                    # §2C lines 2041, 2059
    slope_63d_lookback: 63                    # §2C line 2046
    total_return_lookback_days: 63            # §2C line 2032
    spy_return_lookback_days: 21              # §2C line 2075
    tlt_return_lookback_days: 21              # §2C line 2084
    broad_usd_change_window_days: 21          # §2C lines 2052-2055 (21d variant)
    broad_usd_normalizer_window_days: 1260    # §2C line 2055 (~5y, same as §2A)
  # §2C lines 2110-2117 — per-label asymmetric hysteresis days.
  deescalation_days_by_label:
    deleveraging: 5
    funding_squeeze: 5
    credit_stress: 3
    spread_widening: 3
    credit_recovery: 0
    credit_calm: 0
    # Absence of signal must not hold back the TLT/OAS effective recovery once
    # a valid credit/funding rule fires.
    unknown: 0
  default_deescalation_days: 0
  max_unknown_freeze_days: 2
  # §2C lines 2123-2124 — unknown-gate staleness thresholds.
  nfci_stale_days: 14
  etf_stale_sessions: 5

# v2 §2B — Inflation / Growth axis (implementation phase). Per documented implementation decision, DBC ETF
# substitutes for the Bloomberg Commodity Index (paid feed unavailable); the
# classifier emits a bias-warning row with code
# `commodity_proxy_dbc_substitute`. documented implementation decisions:
#   - earnings_expansion / earnings_contraction: consume the weekly
#     aggregate-forward-EPS revision series built by the EPS accumulator
#     (regime_data_fetch.aggregate_eps); silent during the < 5-week
#     accumulator cold-start. No paid feed.
#   - inflation_shock single-signal limb: consumes inflation_surprise_zscore,
#     computed from the Cleveland Fed inflation nowcast (ADR 0006). No paid feed.
inflation_growth:
  rules:
    cpi_drift_threshold: 0.005                     # §2B line 2234 (50bps)
    pmi_goldilocks_threshold: 50.0                 # §2B line 2236
    pmi_recovery_threshold: 50.0                   # §2B line 2259
    pmi_disinflation_threshold: 45.0               # §2B line 2250
    cpi_3m_acceleration_threshold: 0.02             # 3m CPI rapid-onset limb
    commodity_return_threshold: 0.15               # §2B line 2242
    spy_recession_threshold: -0.05                 # §2B line 2256
    spy_recession_credit_confirmed_threshold: -0.05  # ADR 0012 R2: matches spec §2B; mild-decline gap deferred to future credit_watch ADR
    cpi_lookback_3m_sessions: 63                   # §2B line 2197 (~3 months)
    cpi_lookback_6m_sessions: 126                  # §2B line 2198 (~6 months)
    cpi_slope_lookback_sessions: 21                # §2B line 2235
    pmi_slope_lookback_sessions: 21                # §2B line 2209
    commodity_return_lookback_sessions: 63         # §2B line 2220
    treasury_slope_lookback_sessions: 21           # §2B line 2223
    cyclical_defensive_slope_lookback_sessions: 21 # §2B line 2227
    spy_return_lookback_sessions: 21               # §2B line 2237
    tlt_return_lookback_sessions: 21               # §2B line 2245
    # ADR 0006 — inflation_shock single-signal limb (Cleveland Fed nowcast):
    inflation_surprise_zscore_threshold: 1.5             # §2B line 2551
    inflation_surprise_normalizer_window_sessions: 1260  # 5y, §2A z-score convention
    inflation_surprise_realized_rate_lookback_sessions: 21
    # documented implementation decision — earnings_expansion / earnings_contraction thresholds:
    eps_revision_expansion_threshold: 0.02         # §2B line 2605
    eps_revision_contraction_threshold: -0.02      # §2B line 2609
    cpi_goldilocks_benign_ceiling: 0.04            # CPI below 4% annualized = benign
    disinflation_yield_independent: true           # CPI slope alone suffices
    allow_credit_independent_fallback: true         # fire goldilocks/recession/recovery when credit unavailable
    spy_recession_credit_independent_threshold: -0.07  # stricter SPY gate without credit confirmation
    # §2A lines 2587-2593 — first-release vs latest-revision CPI for replay.
    # Source-data audit (the source-data audit). When True and
    # MarketContext.cpi_first_release is supplied (from the CPIAUCSL vintages
    # parquet), inflation_growth uses the value-as-of-release. When False or
    # when the vintage seam is absent, the existing latest-revision CPIAUCSL
    # path is preserved unchanged. Emits the `cpi_first_release_vintage_replay`
    # provenance row on the feature-store bias-warnings frame.
    use_first_release_cpi_when_available: true
  # §2B lines 2292-2303 — per-label asymmetric hysteresis days.
  deescalation_days_by_label:
    inflation_shock: 5
    recession_scare: 5
    risk_off_mild: 3
    earnings_contraction: 3
    disinflation: 3
    stagflation_lite: 3
    reflation: 0
    goldilocks: 0
    recovery_growth: 0
    earnings_expansion: 0
    # Absence of signal must not delay recovery into a valid macro label.
    unknown: 0
  default_deescalation_days: 0
  max_unknown_freeze_days: 2
  # §2B lines 2309-2311 — unknown-gate staleness thresholds.
  cpi_stale_calendar_days: 60
  pmi_stale_calendar_days: 45
  dgs10_stale_sessions: 5
  # EPS revision staleness: matches EPS_REVISION_STALE_DAYS = 35 in
  # profile_engine_reporting.py. When the weekly EPS parquet has not updated
  # for > 35 calendar days, the EPS signal is treated as NaN and
  # earnings_expansion / earnings_contraction labels do not fire.
  eps_revision_stale_calendar_days: 35
  # Cleveland Fed nowcast cadence is monthly/current-period. When stale,
  # only the optional inflation-surprise limb is treated as NaN.
  nowcast_stale_calendar_days: 60

hmm:
  n_states: 4
  # Spec §6.1 line 2786: "Fit on at least 5 years of data" (≈1260 NYSE
  # sessions). Prior value (504, 2y) was a placeholder — bumped by implementation phase
  # to satisfy the spec minimum. See documented implementation notes.
  training_window_days: 1260
  # Ops/dev concern: engine is stateless and refits per classify_window.
  # The quarterly cadence is documented for operator-side scheduling. See
  # documented implementation notes.
  retrain_cadence_days: 21
  # implementation phase: reproducibility seed for hmmlearn.GaussianHMM.
  random_state: 42
  # Stabilize EM on mixed-scale market features while keeping deterministic
  # hmmlearn fits. The wrapper tries these seeds and accepts the highest
  # final log-likelihood among monotonic fits.
  standardize_inputs: true
  covariance_type: full
  min_covar: 0.001
  # Full 10-seed sweep restored — compute_hmm_features parallelizes the
  # per-checkpoint seed sweep across CPU cores (joblib loky backend, BLAS
  # pinned to one thread per worker), so the wall-clock cost is dominated
  # by max(per-seed-time) rather than sum. tol pinned to the hmmlearn
  # default keeps EM fixed-point selection byte-identical to the legacy
  # sequential implementation.
  random_seeds: [42, 101, 202, 303, 404, 505, 606, 707, 808, 909]
  tol: 0.01

# v2 §6.2 K-Means/GMM Clustering — diagnostic evidence layer.
clustering:
  n_clusters: 8
  training_window_days: 1260       # 5y, matches HMM training window
  # Refit cadence in NYSE sessions: 21 mirrors HMM (§6.1). Legacy code
  # refit every session (cadence=1); that was ~20x more work AND introduced
  # label permutations on adjacent k-means initializations. The checkpoint
  # cadence is both faster and more stable; the last partial segment is
  # always included so the most-recent session gets a fresh fit.
  retrain_cadence_days: 21
  random_state: 42
  covariance_type: full
  model_version: "gmm_8cluster_v1.0"

# v2 §6.3 + §4.6 Change-Point Detection (implementation phase, evidence-only).
# Algorithm: BOCPD (Adams & MacKay 2007). Library:
# bayesian-changepoint-detection (documented implementation decision updates the
# ruptures reference). Observation series: realized_vol_21d (#63).
# Score = 5-session rolling max of posterior (#64). Break = posterior
# >= 0.5 (#65). Hazard lambda = 250 (one expected break per trading
# year, calibration placeholder per spec line 2872).
change_point:
  hazard_lambda: 250.0
  score_window_days: 5
  recent_run_length_window_days: 21
  break_threshold: 0.5
  training_window_days: 2705
  student_t_alpha: 0.1
  student_t_beta: 0.01
  student_t_kappa: 1.0
  student_t_mu: 0.0
  method: "BOCPD"

no_flip_flop:
  window_trading_days: 15

strategy_event_modifiers:
  rules:
    macro_event_window:
      labels: [fed_week, cpi_week, nfp_week, global_rate_decision]
      position_size_cap: 0.75
      allow_leverage_expansion: false
      require_confirmation_for_new_longs: true
    policy_or_event_risk_window:
      labels: [budget_week, election_window, geopolitical_event]
      position_size_cap: 0.50
      leverage_allowed: false
      prefer_cash_or_hedges: true
      require_confirmation_for_new_longs: true

# v2 §5.1 Agent Cohort Routing (implementation phase, documented implementation decision calibration placeholder).
cohort_routing:
  routing_rules:
    crisis_specialist:
      any_of:
        - {axis: "network_fragility", values: ["correlation_to_one", "systemic_stress_unconfirmed", "systemic_stress"]}
        - {axis: "volatility_state", values: ["crisis_vol"]}
    euphoria_specialist:
      all_of:
        - {axis: "trend_direction", values: ["euphoria"]}
    bear_stress_specialist:
      all_of:
        - {axis: "trend_direction", values: ["bear"]}
        - {axis: "breadth_state", values: ["weak_breadth", "divergent_fragile", "narrowing_breadth"]}
    tightening_specialist:
      all_of:
        - {axis: "monetary_pressure", values: ["tightening_pressure", "rate_shock"]}
    easing_specialist:
      all_of:
        - {axis: "monetary_pressure", values: ["easing_pressure"]}
    recovery_specialist:
      all_of:
        - {axis: "trend_direction", values: ["recovery"]}
    chop_mean_reversion_specialist:
      all_of:
        - {axis: "trend_character", values: ["range_bound"]}
        - {axis: "volatility_state", values: ["normal_vol", "low_vol"]}
    bull_low_vol_specialist:
      all_of:
        - {axis: "trend_direction", values: ["bull"]}
        - {axis: "volatility_state", values: ["low_vol", "normal_vol"]}
  blocked_strategy_modes:
    crisis_specialist:       ["short_vol", "leveraged_long", "breakout"]
    euphoria_specialist:     ["mean_reversion"]
    bear_stress_specialist:  ["short_vol", "breakout", "leveraged_long"]
    tightening_specialist:   []
    easing_specialist:       []
    recovery_specialist:     ["short_vol"]
    chop_mean_reversion_specialist: ["trend_following", "breakout"]
    bull_low_vol_specialist: []
    default_neutral:         []

# v2 §5.2 Strategy Family Constraints (implementation phase, documented implementation decision calibration placeholder).
# Override-on-default inheritance: each specialist cohort declares ONLY overrides;
# unspecified families inherit default_neutral. Spec lines 2574-2650.
strategy_family_constraints:
  default_neutral:
    trend_following: {allowed: true,  max_lookback_days: 50, require_breadth_confirmation: false, min_adx: 20}
    mean_reversion:  {allowed: true,  max_holding_days: 5,   require_volume_confirmation: true}
    breakout:        {allowed: false, reason: "false_breakout_rate_high_in_chop"}
    short_vol:       {allowed: false, reason: "rising_fragility_or_crisis"}
    long_vol:        {allowed: true,  event_window_only: true}
  overrides:
    crisis_specialist:
      trend_following: {allowed: false, reason: "false_signals_in_chop"}
      mean_reversion:  {allowed: false, reason: "knife_catching"}
      breakout:        {allowed: false, reason: "false_breakout_rate_high"}
      short_vol:       {allowed: false, reason: "vol_can_keep_expanding"}
      long_vol:        {allowed: true,  event_window_only: false}
    euphoria_specialist:
      mean_reversion:  {allowed: false, reason: "do_not_fade_strength"}
    bear_stress_specialist:
      trend_following: {allowed: false, reason: "directional_in_stressed_chop"}
      breakout:        {allowed: false, reason: "false_breakout_rate_high"}
      short_vol:       {allowed: false, reason: "stress_can_persist"}
      long_vol:        {allowed: true,  event_window_only: false}
    tightening_specialist:
      trend_following: {allowed: true,  max_lookback_days: 50, require_breadth_confirmation: true}
      breakout:        {allowed: true,  require_volume_confirmation: true}
      long_vol:        {allowed: true,  event_window_only: true}
    easing_specialist: {}
    recovery_specialist:
      short_vol:       {allowed: false, reason: "recovery_can_relapse"}
    chop_mean_reversion_specialist:
      trend_following: {allowed: false, reason: "chop_kills_trend"}
      breakout:        {allowed: false, reason: "false_breakouts_dominant"}
      mean_reversion:  {allowed: true,  max_holding_days: 10, require_volume_confirmation: false}
    bull_low_vol_specialist:
      trend_following: {allowed: true,  max_lookback_days: 200, min_adx: 15}
      mean_reversion:  {allowed: true,  max_holding_days: 10}
      breakout:        {allowed: true}
      short_vol:       {allowed: true,  max_position_pct: 0.25}
